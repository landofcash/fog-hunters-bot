name: fhaibot

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fhaibot_test
      POSTGRES_USER: fhaibot
      POSTGRES_PASSWORD: fhaibot_local
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fhaibot -d fhaibot_test"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - fhaibot_postgres_data:/var/lib/postgresql/data

volumes:
  fhaibot_postgres_data:
