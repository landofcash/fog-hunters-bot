name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/api/package-lock.json
            apps/bot/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix apps/api
          npm ci --prefix apps/bot

      - name: Generate Prisma client and validate schema
        run: |
          npm --prefix apps/api run prisma:generate
          npm --prefix apps/api run prisma:validate
        env:
          DATABASE_URL: postgresql://fhaibot:ci@localhost:5432/fhaibot_ci?schema=public

      - name: Lint applications
        run: npm run lint

      - name: Build applications
        run: npm run build

  unit-coverage:
    name: Unit coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/api/package-lock.json
            apps/bot/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix apps/api
          npm ci --prefix apps/bot

      - name: Generate Prisma client
        run: npm --prefix apps/api run prisma:generate
        env:
          DATABASE_URL: postgresql://fhaibot:ci@localhost:5432/fhaibot_ci?schema=public

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-coverage
          path: |
            apps/api/coverage
            apps/bot/coverage
          if-no-files-found: error
          retention-days: 14

  integration:
    name: PostgreSQL integration
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://fhaibot:fhaibot_ci@localhost:5432/fhaibot_ci?schema=public
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fhaibot_ci
          POSTGRES_USER: fhaibot
          POSTGRES_PASSWORD: fhaibot_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fhaibot -d fhaibot_ci"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        run: npm ci --prefix apps/api

      - name: Generate Prisma client and validate schema
        run: |
          npm --prefix apps/api run prisma:generate
          npm --prefix apps/api run prisma:validate

      - name: Apply database migrations
        run: npm --prefix apps/api run prisma:migrate:deploy

      - name: Run integration tests
        run: npm --prefix apps/api run test:integration
